<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Transaction Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>UPI Transaction</h2>
        <form id="upiForm" action="/process" method="Post">
            <div>
                <input style="display: none;" type="text" name="user_id" id="user_id" value="{{user_id}}"></input>

                <label for="bank">Select Your Bank</label>
                <select id="bank" name="bank" required>
                    <option value="">--Select Bank--</option>
                    <option value="SBI">State Bank of India</option>
                    <option value="HDFC">HDFC Bank</option>
                    <option value="AXIS">Axis Bank</option>
                </select>
                <input style="display: none;" type="text" name="user_id" id="user_id" value={{user_id}}></input>
                <label for="upiId">Enter UPI ID</label>
                <input type="text" id="upi" name="upi" placeholder="example@bank" required>

                <label for="amount">Enter Amount</label>
                <input type="text" id="amount" name="amount" placeholder="$$$$" required>
            </div>
            <input type="submit" value="Proceed to Pay">
        </form>
    </div>

</body>

</html>
